<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2D三角洲行动 V6.1</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#1a1a2e; overflow:hidden; font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif; }
        #gameCanvas { display:block; cursor:crosshair; }
        #damageOverlay { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:40; }
        #sandstormOverlay { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:45; display:none; background:rgba(0,0,0,0); transition:background 1s ease; }
        #sandstormText { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); color:#f4d58d; font-size:2rem; font-weight:bold; z-index:46; opacity:0; transition:opacity 1s ease; text-align:center; pointer-events:none; text-shadow:0 0 20px rgba(244,213,141,0.8); }
        .menu-screen { position:absolute; top:0; left:0; width:100%; height:100%; display:flex; flex-direction:column; justify-content:center; align-items:center; background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%); z-index:100; }
        .menu-screen.hidden { display:none; }
        .game-title { font-size:4rem; font-weight:bold; color:#e94560; text-shadow:0 0 20px rgba(233,69,96,0.5),0 4px 8px rgba(0,0,0,0.5); margin-bottom:1rem; letter-spacing:4px; }
        .game-subtitle { font-size:1.2rem; color:#a0a0a0; margin-bottom:3rem; letter-spacing:2px; }
        .menu-btn { padding:1rem 3rem; font-size:1.3rem; font-weight:bold; color:white; background:linear-gradient(135deg,#e94560,#c73e54); border:none; border-radius:8px; cursor:pointer; margin:0.5rem; transition:all 0.3s ease; box-shadow:0 4px 15px rgba(233,69,96,0.4); text-transform:uppercase; letter-spacing:2px; }
        .menu-btn:hover { transform:translateY(-3px) scale(1.05); box-shadow:0 8px 25px rgba(233,69,96,0.6); }
        .controls-info { margin-top:3rem; color:#888; text-align:center; line-height:2; }
        .controls-info span { display:inline-block; background:#333; padding:4px 12px; border-radius:4px; margin:0 4px; color:#fff; }
        #hud { position:absolute; top:20px; left:20px; z-index:50; pointer-events:none; }
        .hud-item { background:rgba(0,0,0,0.75); padding:10px 20px; border-radius:8px; margin-bottom:10px; color:white; font-weight:bold; border-left:4px solid #e94560; backdrop-filter:blur(5px); }
        .health-bar-container { width:200px; height:20px; background:#333; border-radius:10px; overflow:hidden; margin-top:5px; }
        .health-bar { height:100%; background:linear-gradient(90deg,#e94560,#ff6b6b); transition:width 0.3s ease; }
        .armor-display { display:flex; gap:20px; margin-top:8px; }
        .armor-slot { font-size:0.85rem; }
        .armor-name { color:#aaa; }
        .armor-durability { height:6px; background:#333; border-radius:3px; overflow:hidden; margin-top:3px; width:80px; }
        .armor-durability-bar { height:100%; transition:width 0.2s; }
        .game-over-screen { position:absolute; top:0; left:0; width:100%; height:100%; display:none; flex-direction:column; justify-content:center; align-items:center; background:rgba(0,0,0,0.9); z-index:100; }
        .game-over-screen.show { display:flex; }
        .game-over-title { font-size:4rem; font-weight:bold; color:#e94560; margin-bottom:1rem; }
        .game-over-title.victory { color:#2ecc71; }
        .final-stats { font-size:1.3rem; color:#fff; margin:1rem 0; text-align:center; line-height:1.8; background:rgba(0,0,0,0.5); padding:20px 40px; border-radius:10px; }
        .final-stats span { color:#e94560; font-weight:bold; }
        .final-stats span.gold { color:#f1c40f; }
        #minimap { position:absolute; bottom:20px; right:20px; width:240px; height:240px; background:rgba(0,0,0,0.75); border:2px solid #e94560; border-radius:8px; z-index:50; }
        #ammoDisplay { position:absolute; bottom:20px; left:20px; background:rgba(0,0,0,0.75); padding:15px 25px; border-radius:8px; color:white; font-size:1rem; font-weight:bold; z-index:50; border-left:4px solid #4CAF50; }
        .reload-indicator { color:#ffaa00; animation:pulse 0.5s infinite; }
        @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.5; } }
        #lootingProgress { position:absolute; top:65%; left:50%; transform:translate(-50%,-50%); z-index:60; display:none; text-align:center; }
        #lootingProgress.show { display:block; }
        .looting-bar-container { width:300px; height:25px; background:rgba(0,0,0,0.8); border-radius:12px; overflow:hidden; border:2px solid #f1c40f; }
        .looting-bar { height:100%; background:linear-gradient(90deg,#f1c40f,#f39c12); width:0%; transition:width 0.1s linear; }
        .looting-text { color:white; font-weight:bold; margin-bottom:10px; font-size:1.2rem; }
        .interface-panel { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); background:rgba(20,20,35,0.98); padding:25px; border-radius:12px; z-index:80; min-width:480px; border:2px solid; display:none; max-height:85vh; overflow-y:auto; }
        .interface-panel.show { display:block; }
        .interface-panel.loot { border-color:#f1c40f; }
        .interface-panel.backpack { border-color:#3498db; }
        .interface-panel.confirm { border-color:#e67e22; min-width:350px; }
        .panel-title { font-size:1.3rem; font-weight:bold; margin-bottom:15px; text-align:center; }
        .panel-title.loot { color:#f1c40f; }
        .panel-title.backpack { color:#3498db; }
        .panel-title.confirm { color:#e67e22; }
        .item-row { display:flex; align-items:center; justify-content:space-between; padding:10px; margin:6px 0; background:rgba(255,255,255,0.08); border-radius:6px; border-left:3px solid; }
        .item-row.common { border-left-color:#bdc3c7; }
        .item-row.uncommon { border-left-color:#2ecc71; }
        .item-row.rare { border-left-color:#3498db; }
        .item-row.epic { border-left-color:#9b59b6; }
        .item-row.legendary { border-left-color:#f1c40f; }
        .item-info { flex:1; color:white; }
        .item-name { font-weight:bold; }
        .item-desc { font-size:0.8rem; color:#aaa; }
        .item-buttons { display:flex; gap:5px; flex-wrap:wrap; }
        .btn { padding:6px 10px; border:none; border-radius:4px; color:white; cursor:pointer; font-weight:bold; font-size:0.8rem; transition:all 0.2s; }
        .btn:disabled { background:#555 !important; cursor:not-allowed; opacity:0.6; }
        .btn-pick { background:#2ecc71; }
        .btn-use { background:#3498db; }
        .btn-drop { background:#e74c3c; }
        .btn-equip { background:#e67e22; }
        .btn-equip1 { background:#e67e22; }
        .btn-equip2 { background:#9b59b6; }
        .close-btn { position:absolute; top:10px; right:15px; background:none; border:none; color:#aaa; font-size:1.5rem; cursor:pointer; }
        .close-btn:hover { color:white; }
        #extractPrompt { position:absolute; bottom:100px; left:50%; transform:translateX(-50%); background:rgba(46,204,113,0.95); padding:15px 35px; border-radius:8px; color:white; font-weight:bold; font-size:1.1rem; z-index:60; display:none; animation:pulse 1s infinite; box-shadow:0 0 30px rgba(46,204,113,0.5); }
        #extractPrompt.show { display:block; }
        .item-popup { position:absolute; background:rgba(0,0,0,0.9); padding:8px 15px; border-radius:6px; color:white; font-weight:bold; z-index:70; pointer-events:none; animation:floatUp 1.5s ease-out forwards; }
        @keyframes floatUp { 0% { opacity:1; transform:translateY(0); } 100% { opacity:0; transform:translateY(-50px); } }
        #weaponSlots { position:absolute; top:20px; right:20px; z-index:50; }
        .weapon-slot { background:rgba(0,0,0,0.75); padding:10px 15px; border-radius:8px; margin-bottom:8px; color:white; min-width:200px; border:2px solid transparent; }
        .weapon-slot.active { border-color:#e67e22; background:rgba(230,126,34,0.2); }
        .weapon-slot.slot2 { border-left:4px solid #9b59b6; }
        .weapon-slot.slot1 { border-left:4px solid #e67e22; }
        .weapon-slot-name { font-weight:bold; font-size:0.9rem; }
        .weapon-slot-ammo { font-size:0.8rem; color:#aaa; }
        .weapon-slot-key { float:right; color:#888; font-size:0.8rem; }
        .capacity-bar { text-align:center; color:#aaa; margin-top:15px; padding-top:10px; border-top:1px solid #333; }
        .confirm-buttons { display:flex; gap:10px; justify-content:center; margin-top:20px; }
        .btn-confirm { padding:10px 25px; background:#2ecc71; border:none; border-radius:6px; color:white; font-weight:bold; cursor:pointer; }
        .btn-cancel { padding:10px 25px; background:#e74c3c; border:none; border-radius:6px; color:white; font-weight:bold; cursor:pointer; }
        .confirm-text { color:white; text-align:center; font-size:1.1rem; }
        .secure-box-title { color:#00d4ff; font-size:1.1rem; margin:15px 0 10px 0; padding-bottom:8px; border-bottom:2px solid #00d4ff; }
        .secure-item-row { border-left-color:#00d4ff !important; }
        .lobby { position:absolute; top:0; left:0; width:100%; height:100%; display:flex; flex-direction:column; justify-content:center; align-items:center; background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%); z-index:200; }
        .lobby.hidden { display:none; }
        .lobby-title { font-size:4rem; font-weight:bold; color:#e94560; text-shadow:0 0 20px rgba(233,69,96,0.5); margin-bottom:1rem; letter-spacing:4px; }
        .lobby-money { font-size:1.8rem; color:#f1c40f; margin:1rem 0 2rem 0; }
        .lobby-btn { padding:1rem 3rem; margin:0.5rem; font-size:1.2rem; font-weight:bold; border:none; border-radius:8px; color:#fff; cursor:pointer; transition:0.3s; min-width:280px; }
        .lobby-btn.start { background:linear-gradient(135deg,#e94560,#c73e54); }
        .lobby-btn.storage { background:linear-gradient(135deg,#3498db,#2980b9); }
        .lobby-btn.market { background:linear-gradient(135deg,#9b59b6,#8e44ad); }
        .lobby-btn.craft { background:linear-gradient(135deg,#f39c12,#e67e22); }
        .lobby-btn:hover { transform:translateY(-3px) scale(1.05); }
        .storage-panel,.market-panel,.craft-panel { position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(10,10,20,0.98); z-index:250; padding:3rem; overflow-y:auto; display:none; }
        .storage-panel.show,.market-panel.show,.craft-panel.show { display:block; }
        .panel-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:2rem; color:#fff; font-size:1.5rem; max-width:1000px; margin-left:auto; margin-right:auto; }
        .panel-close { padding:0.6rem 1.5rem; background:#e74c3c; color:#fff; border:none; border-radius:6px; cursor:pointer; font-weight:bold; }
        .item-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:1rem; max-width:1000px; margin:0 auto; }
        .storage-item { background:rgba(255,255,255,0.08); padding:1rem; border-radius:8px; border-left:4px solid; color:#fff; }
        .storage-item.common { border-left-color:#bdc3c7; }
        .storage-item.uncommon { border-left-color:#2ecc71; }
        .storage-item.rare { border-left-color:#3498db; }
        .storage-item.epic { border-left-color:#9b59b6; }
        .storage-item.legendary { border-left-color:#f1c40f; }
        .item-ops { margin-top:0.8rem; display:flex; gap:0.5rem; flex-wrap:wrap; }
        .item-btn { padding:0.4rem 0.7rem; border:none; border-radius:4px; color:#fff; font-size:0.8rem; font-weight:bold; cursor:pointer; flex:1; }
        .btn-bring { background:#2ecc71; }
        .btn-sell { background:#e67e22; }
        .btn-buy { background:#f39c12; }
        .btn-refresh { display:block; margin:2rem auto; padding:0.8rem 2rem; background:linear-gradient(135deg,#9b59b6,#8e44ad); color:#fff; border:none; border-radius:6px; cursor:pointer; font-weight:bold; font-size:1rem; }
        .bring-tag { background:#2ecc71; font-size:0.7rem; padding:2px 8px; border-radius:10px; display:inline-block; margin-bottom:0.5rem; font-weight:bold; }
        .empty-tip { color:#888; grid-column:1/-1; text-align:center; padding:3rem; font-size:1.1rem; }
        .craft-group { background:rgba(255,255,255,0.06); padding:1rem; border-radius:8px; margin-bottom:1rem; border:1px solid #555; }
        .craft-group-title { color:#f39c12; font-weight:bold; font-size:1.1rem; margin-bottom:0.5rem; }
        .craft-info { color:#aaa; font-size:0.85rem; margin-bottom:0.5rem; }
        .btn-craft-action { padding:0.6rem 1.5rem; background:#f39c12; color:#fff; border:none; border-radius:6px; cursor:pointer; font-weight:bold; font-size:0.9rem; }
        .bandage-indicator { position:absolute; top:180px; left:20px; z-index:50; pointer-events:none; background:rgba(0,0,0,0.75); padding:8px 15px; border-radius:6px; color:#83b05d; font-weight:bold; font-size:0.9rem; border-left:4px solid #83b05d; }
    </style>
</head>
<body>
<div id="lobby" class="lobby">
    <h1 class="lobby-title">三角洲行动</h1>
    <div class="lobby-money">💰 钞票：<span id="lobbyMoney">10000</span></div>
    <button class="lobby-btn start" onclick="enterGame()">开始任务</button>
    <button class="lobby-btn storage" onclick="openStorage()">我的仓库</button>
    <button class="lobby-btn market" onclick="openMarket()">黑市商店</button>
    <button class="lobby-btn craft" onclick="openCraft()">🔧 合成台</button>
</div>
<div id="storagePanel" class="storage-panel">
    <div class="panel-head"><div>📦 我的仓库 | 💰 钞票：<span id="storageMoney">0</span></div><button class="panel-close" onclick="closeStorage()">返回大厅</button></div>
    <div id="storageGrid" class="item-grid"></div>
</div>
<div id="marketPanel" class="market-panel">
    <div class="panel-head"><div>🛒 黑市商店 | 💰 钞票：<span id="marketMoney">0</span></div><button class="panel-close" onclick="closeMarket()">返回大厅</button></div>
    <div id="marketGrid" class="item-grid"></div>
    <button class="btn-refresh" onclick="refreshMarket()">🔄 刷新商品 (消耗1000钞票)</button>
</div>
<div id="craftPanel" class="craft-panel">
    <div class="panel-head"><div>🔧 合成台 | 💰 钞票：<span id="craftMoney">0</span></div><button class="panel-close" onclick="closeCraft()">返回大厅</button></div>
    <div id="craftContent" style="max-width:900px;margin:0 auto;"></div>
</div>
<div id="sandstormOverlay"></div>
<div id="sandstormText"></div>
<canvas id="damageOverlay"></canvas>
<canvas id="gameCanvas"></canvas>
<div id="hud" style="display: none;">
    <div class="hud-item"><div>生命值</div><div class="health-bar-container"><div id="healthBar" class="health-bar" style="width: 100%"></div></div>
        <div class="armor-display">
            <div class="armor-slot"><span class="armor-name" id="helmetName">🪖 无头盔</span><div class="armor-durability"><div id="helmetDurability" class="armor-durability-bar" style="width: 100%; background: #3498db;"></div></div></div>
            <div class="armor-slot"><span class="armor-name" id="armorName">🛡️ 无护甲</span><div class="armor-durability"><div id="armorDurability" class="armor-durability-bar" style="width: 100%; background: #e67e22;"></div></div></div>
        </div>
    </div>
    <div class="hud-item">击杀: <span id="killsDisplay">0</span></div>
    <div class="hud-item">总价值: <span id="valueDisplay">0</span></div>
</div>
<div id="bandageIndicator" class="bandage-indicator" style="display:none;">🩹 绷带效果生效中</div>
<div id="ammoDisplay" style="display: none;"><div>弹匣: <span id="ammoCount">30</span>/<span id="ammoMax">30</span></div></div>
<div id="weaponSlots" style="display: none;"></div>
<canvas id="minimap" style="display: none;"></canvas>
<div id="lootingProgress"><div class="looting-text">搜索中...</div><div class="looting-bar-container"><div id="lootingBar" class="looting-bar"></div></div></div>
<div id="healProgress"><div class="heal-text" id="healText">使用药品中...</div><div class="heal-bar-container"><div id="healBar" class="heal-bar"></div></div></div>
<div id="switchIndicator" class="switch-indicator"></div>
<div id="lootInterface" class="interface-panel loot"><button class="close-btn" onclick="closeLootInterface()">×</button><div class="panel-title loot" id="lootBoxTitle">物资箱</div><div id="lootItemsList"></div></div>
<div id="backpackInterface" class="interface-panel backpack"><button class="close-btn" onclick="closeBackpack()">×</button><div class="panel-title backpack">🎒 背包系统</div><div id="backpackItemsList"></div><div class="capacity-bar">容量: <span id="bpCapacityUsed">0</span>/<span id="bpCapacityMax">50</span> 格</div></div>
<div id="confirmInterface" class="interface-panel confirm"><div class="panel-title confirm">⚠️ 确认</div><div class="confirm-text" id="confirmText"></div><div class="confirm-buttons"><button class="btn-confirm" onclick="confirmAction()">确认</button><button class="btn-cancel" onclick="cancelAction()">取消</button></div></div>
<div id="extractPrompt">按 E 键撤离</div>

<script>
    // ==================== 数据定义 ====================
    const ENEMY_TIERS = [
        { name: 'Common', color: '#2ecc71', hpMultiplier: 1, lockTime: 1000, dropSameRate: 0.64, tierIdx: 0 },
        { name: 'Unusual', color: '#f1c40f', hpMultiplier: 2, lockTime: 3000, dropSameRate: 0.50, tierIdx: 1 },
        { name: 'Rare', color: '#3498db', hpMultiplier: 3, lockTime: 5000, dropSameRate: 0.37, tierIdx: 2 },
        { name: 'Epic', color: '#9b59b6', hpMultiplier: 5, lockTime: 8000, dropSameRate: 0.23, tierIdx: 3 },
        { name: 'Legendary', color: '#e74c3c', hpMultiplier: 10, lockTime: 10000, dropSameRate: 0.10, tierIdx: 4 },
        { name: 'Mythic', color: '#00d4ff', hpMultiplier: 20, lockTime: 15000, dropSameRate: 0.001, tierIdx: 5 },
        { name: 'Ultra', color: '#ff69b4', hpMultiplier: 30, lockTime: 20000, dropSameRate: 0.001, tierIdx: 6 },
        { name: 'Super', color: '#00ff88', hpMultiplier: 50, lockTime: 30000, dropSameRate: 0.001, tierIdx: 7 }
    ];
    const PYRAMID_LOOT_NAMES = ['远古残骸', '远古遗物', '圣遗物', '安卡', '神秘的身份牌'];
    const PYRAMID_LOOT_BASE_VALUES = { '远古残骸': 500, '远古遗物': 800, '圣遗物': 1500, '安卡': 3000, '神秘的身份牌': 5000 };
    const TIER_VALUE_MULTIPLIERS = [1, 2, 3, 5, 10, 20, 30, 50];
    const BANDAGE_BASE_VALUE = 3000;
    const BANDAGE_DAMAGE_REDUCTION = { 4: 0.10, 5: 0.20, 6: 0.35, 7: 0.50 };
    const BANDAGE_LOCK_TIMES = { 4: 10000, 5: 15000, 6: 20000, 7: 30000 };

    function getTierColor(tierIdx) { return ENEMY_TIERS[tierIdx] ? ENEMY_TIERS[tierIdx].color : '#fff'; }
    function getTierName(tierIdx) { return ENEMY_TIERS[tierIdx] ? ENEMY_TIERS[tierIdx].name : 'Unknown'; }
    function createPyramidLootItem(lootName, tierIdx) {
        const tier = ENEMY_TIERS[tierIdx];
        const baseVal = PYRAMID_LOOT_BASE_VALUES[lootName] || 500;
        return {
            name: lootName, type: 'pyramid_loot', tier: tierIdx, tierName: tier.name, tierColor: tier.color,
            size: 2, rarity: tier.name.toLowerCase(), value: baseVal * TIER_VALUE_MULTIPLIERS[tierIdx],
            description: `${tier.name}等级变卖物`
        };
    }
    function createBandageItem(tierIdx) {
        const tier = ENEMY_TIERS[tierIdx];
        return {
            name: '🩹 绷带', type: 'bandage', tier: tierIdx, tierName: tier.name, tierColor: tier.color,
            damageReduction: BANDAGE_DAMAGE_REDUCTION[tierIdx] || 0.10,
            lockTime: BANDAGE_LOCK_TIMES[tierIdx] || 10000, size: 1, rarity: tier.name.toLowerCase(),
            value: BANDAGE_BASE_VALUE * TIER_VALUE_MULTIPLIERS[tierIdx],
            description: `减伤${((BANDAGE_DAMAGE_REDUCTION[tierIdx]||0.10)*100).toFixed(0)}% | 锁血${((BANDAGE_LOCK_TIMES[tierIdx]||10000)/1000).toFixed(0)}s`
        };
    }

    const HELMETS = [
        { id: 'none', name: '无头盔', reduction: 0, speedPenalty: 0, maxDurability: 0, size: 0, rarity: 'common', value: 0, type: 'helmet' },
        { id: 'tactical', name: '战术头盔', reduction: 0.20, speedPenalty: 0, maxDurability: 100, size: 3, rarity: 'common', value: 300, type: 'helmet' },
        { id: 'ballistic', name: '防弹头盔', reduction: 0.35, speedPenalty: 0, maxDurability: 150, size: 3, rarity: 'uncommon', value: 600, type: 'helmet' },
        { id: 'heavy', name: '重型头盔', reduction: 0.50, speedPenalty: 0.05, maxDurability: 200, size: 3, rarity: 'rare', value: 1200, type: 'helmet' },
        { id: 'special', name: '特种头盔', reduction: 0.45, speedPenalty: 0, maxDurability: 180, size: 3, rarity: 'epic', value: 2000, type: 'helmet' }
    ];
    const ARMORS = [
        { id: 'none', name: '无护甲', reduction: 0, speedPenalty: 0, maxDurability: 0, size: 0, rarity: 'common', value: 0, type: 'armor' },
        { id: 'tactical_vest', name: '战术背心', reduction: 0.20, speedPenalty: 0, maxDurability: 150, size: 5, rarity: 'common', value: 400, type: 'armor' },
        { id: 'level2', name: '二级甲', reduction: 0.35, speedPenalty: 0, maxDurability: 250, size: 6, rarity: 'uncommon', value: 800, type: 'armor' },
        { id: 'level3', name: '三级甲', reduction: 0.50, speedPenalty: 0.08, maxDurability: 350, size: 7, rarity: 'rare', value: 1500, type: 'armor' },
        { id: 'level4', name: '四级甲', reduction: 0.65, speedPenalty: 0.15, maxDurability: 500, size: 8, rarity: 'epic', value: 3000, type: 'armor' }

    function generatePyramidMaze() {
        const cellSize = 200;
        const cols = Math.floor(CONFIG.PYRAMID_MAP_WIDTH / cellSize);
        const rows = Math.floor(CONFIG.PYRAMID_MAP_HEIGHT / cellSize);
        const grid = [];
        for (let r = 0; r < rows; r++) { grid[r] = []; for (let c = 0; c < cols; c++) grid[r][c] = 1; }
        function carve(r, c) {
            grid[r][c] = 0;
            const dirs = [[0,2],[2,0],[0,-2],[-2,0]];
            for (let i = dirs.length-1; i>0; i--) { const j = Math.floor(Math.random()*(i+1)); [dirs[i], dirs[j]] = [dirs[j], dirs[i]]; }
            for (let [dr, dc] of dirs) {
                const nr = r+dr, nc = c+dc;
                if (nr>0 && nr<rows-1 && nc>0 && nc<cols-1 && grid[nr][nc]===1) {
                    grid[r+dr/2][c+dc/2] = 0; carve(nr, nc);
                }
            }
        }
        carve(1,1); grid[0][1]=0; grid[1][1]=0; grid[0][2]=0;
        const obstacles = [];
        for (let r=0; r<rows; r++) for (let c=0; c<cols; c++) if (grid[r][c]===1) obstacles.push({ x:c*cellSize, y:r*cellSize, width:cellSize, height:cellSize, isMaze:true });
        return { obstacles, grid, cellSize, cols, rows };
    }
    function isPositionInMazeWall(x,y,mazeData,radius=20) {
        for (let obs of mazeData.obstacles) { const cx=Math.max(obs.x,Math.min(x,obs.x+obs.width)); const cy=Math.max(obs.y,Math.min(y,obs.y+obs.height)); if ((x-cx)**2+(y-cy)**2<radius**2) return true; }
        return false;
    }
    function getRandomMazePosition(mazeData, margin=300) {
        for (let attempts=0; attempts<200; attempts++) { const x=margin+Math.random()*(CONFIG.PYRAMID_MAP_WIDTH-margin*2); const y=margin+Math.random()*(CONFIG.PYRAMID_MAP_HEIGHT-margin*2); if (!isPositionInMazeWall(x,y,mazeData,35)) return {x,y}; }
        return {x:CONFIG.PYRAMID_MAP_WIDTH/2, y:CONFIG.PYRAMID_MAP_HEIGHT/2};
    }
    function generatePyramidMap() {

            let tierIdx = Math.floor(distFromOrigin * ENEMY_TIERS.length);
            if (tierIdx >= ENEMY_TIERS.length) tierIdx = ENEMY_TIERS.length-1;

        for (let i=0; i<180; i++) {

    function shoot(){if(player.isReloading||player.isLooting||player.isSwitching||player.isHealing)return;if(lootInterfaceOpen||backpackOpen)return;const weapon=getCurrentWeapon();if(!weapon)return;if(player.ammoInMag<=0){if(player.ammo[weapon.bulletType]>0)startReload();return;}const now=Date.now();if(now-player.lastShot<weapon.fireRate)return;player.lastShot=now;player.ammoInMag--;const spread=(Math.random()-0.5)*weapon.spread;bullets.push({x:player.x+Math.cos(player.angle)*30,y:player.y+Math.sin(player.angle)*30,vx:Math.cos(player.angle+spread)*CONFIG.BULLET_SPEED,vy:Math.sin(player.angle+spread)*CONFIG.BULLET_SPEED,damage:weapon.damage,isPlayer:true});if(weapon.id==='shotgun'){for(let i=0;i<5;i++){const pelletSpread=(Math.random()-0.5)*0.2;bullets.push({x:player.x+Math.cos(player.angle)*30,y:player.y+Math.sin(player.angle)*30,vx:Math.cos(player.angle+pelletSpread)*CONFIG.BULLET_SPEED*0.9,vy:Math.sin(player.angle+pelletSpread)*CONFIG.BULLET_SPEED*0.9,damage:weapon.damage/3,isPlayer:true});}}for(let i=0;i<4;i++){particles.push({x:player.x+Math.cos(player.angle)*30,y:player.y+Math.sin(player.angle)*30,vx:Math.cos(player.angle)*(2+Math.random()*2)+(Math.random()-0.5)*2,vy:Math.sin(player.angle)*(2+Math.random()*2)+(Math.random()-0.5)*2,life:8,maxLife:8,color:'#ffaa00',size:2+Math.random()*2});}updateHUD();}

    function updatePlayer(){
        if(currentMap==="main"){for(let entrance of pyramidEntrances){const dist=Math.sqrt((player.x-entrance.x)**2+(player.y-entrance.y)**2);if(dist<entrance.radius){enterPyramidZone(entrance.entranceId);break;}}}
        if(currentMap==="pyramid"){if(player.x<50||player.x>CONFIG.PYRAMID_MAP_WIDTH-50||player.y<50||player.y>CONFIG.PYRAMID_MAP_HEIGHT-50){exitPyramidZone();}if(!sandstormActive&&pyramidMapObjects.sandstormTimer>0){pyramidMapObjects.sandstormTimer-=16;if(pyramidMapObjects.sandstormTimer<=0){triggerSandstorm();}}updateSandstorm();}
        if(player.isLocked){player.lockTimer-=16;if(player.lockTimer<=0){player.health=0;updateHUD();}}
        let speedMod=1;const hpPercent=player.health/CONFIG.PLAYER_MAX_HEALTH;if(hpPercent<=0.5)speedMod*=0.8;speedMod*=(1-player.helmet.speedPenalty);speedMod*=(1-player.armor.speedPenalty);if(player.speedBoost)speedMod*=1.3;if(player.energyBoost)speedMod*=5;if(player.potionActive)speedMod*=1.3;
        const baseSpeed=CONFIG.PLAYER_SPEED*speedMod;let dx=0,dy=0;if(keys['w'])dy-=1;if(keys['s'])dy+=1;if(keys['a'])dx-=1;if(keys['d'])dx+=1;
        if(dx!==0||dy!==0){const len=Math.sqrt(dx*dx+dy*dy);dx/=len;dy/=len;const newX=player.x+dx*baseSpeed,newY=player.y+dy*baseSpeed;const currentObstacles=currentMap==="pyramid"?pyramidMapObjects.obstacles:obstacles;if(!checkObstacleCollision(newX,player.y,player.radius,currentObstacles)){player.x=newX;}if(!checkObstacleCollision(player.x,newY,player.radius,currentObstacles)){player.y=newY;}}
        const mapWidth=currentMap==="pyramid"?CONFIG.PYRAMID_MAP_WIDTH:CONFIG.MAP_WIDTH;const mapHeight=currentMap==="pyramid"?CONFIG.PYRAMID_MAP_HEIGHT:CONFIG.MAP_HEIGHT;player.x=Math.max(player.radius,Math.min(mapWidth-player.radius,player.x));player.y=Math.max(player.radius,Math.min(mapHeight-player.radius,player.y));
        const worldMouseX=mouse.x+camera.x,worldMouseY=mouse.y+camera.y;player.angle=Math.atan2(worldMouseY-player.y,worldMouseX-player.x);
        if(mouse.down)shoot();
        if(player.speedBoost){player.speedBoostTimer-=16;if(player.speedBoostTimer<=0)player.speedBoost=false;}if(player.energyBoost){player.energyBoostTimer-=16;if(player.energyBoostTimer<=0){player.energyBoost=false;showItemPopup(player.x,player.y,'极速效果结束','#aaa');}}if(player.potionActive){player.potionTimer-=16;if(player.potionTimer<=0){player.potionActive=false;showItemPopup(player.x,player.y,'药水效果结束','#aaa');}}
        updateReload();updateHealing();updateLooting();
        if(currentMap==="main"){const extractDist=Math.sqrt((player.x-extractPoint.x)**2+(player.y-extractPoint.y)**2);document.getElementById('extractPrompt').classList.toggle('show',extractDist<extractPoint.radius+60);}else{document.getElementById('extractPrompt').classList.remove('show');}
        if(currentMap==="pyramid"&&pyramidMapObjects.extractPoint){const ep=pyramidMapObjects.extractPoint;const edist=Math.sqrt((player.x-ep.x)**2+(player.y-ep.y)**2);document.getElementById('extractPrompt').classList.toggle('show',edist<ep.radius+60);if(edist<ep.radius+60)document.getElementById('extractPrompt').textContent='按 E 键离开金字塔';else document.getElementById('extractPrompt').textContent='按 E 键撤离';}
    }
    function updateEnemies(){
        const currentEnemies=currentMap==="pyramid"?pyramidMapObjects.enemies:enemies;const currentObstacles=currentMap==="pyramid"?pyramidMapObjects.obstacles:obstacles;
        for(let i=currentEnemies.length-1;i>=0;i--){const enemy=currentEnemies[i];if(enemy.isLocked){enemy.lockTimer-=16;if(enemy.lockTimer<=0){if(enemy.inPyramid&&enemy.tier>=0){generatePyramidEnemyDrop(enemy);}createDeathParticles(enemy.x,enemy.y);currentEnemies.splice(i,1);kills++;if(currentMap==="main"&&!enemy.inPyramid)setTimeout(()=>spawnEnemies(3),6000);}continue;}if(enemy.health<=0&&!enemy.isLocked&&enemy.lockDuration>0){enemy.isLocked=true;enemy.lockTimer=enemy.lockDuration;enemy.health=1;continue;}if(enemy.health<=0&&enemy.lockDuration<=0){if(enemy.inPyramid&&enemy.tier>=0){generatePyramidEnemyDrop(enemy);}createDeathParticles(enemy.x,enemy.y);currentEnemies.splice(i,1);kills++;if(currentMap==="main"&&!enemy.inPyramid)setTimeout(()=>spawnEnemies(3),6000);continue;}

            ctx.restore();
        }
        ctx.restore();renderDamageEffects();renderMinimap();
    }
    function renderMinimap(){
        if(currentMap==="pyramid"){minimapCtx.fillStyle='#000';minimapCtx.fillRect(0,0,240,240);minimapCtx.fillStyle='#f4d58d';minimapCtx.font='bold 60px Arial';minimapCtx.textAlign='center';minimapCtx.fillText('?',120,140);minimapCtx.fillStyle='#aaa';minimapCtx.font='bold 14px Arial';minimapCtx.fillText('金字塔迷宫',120,180);return;}
        const mapWidth=CONFIG.MAP_WIDTH;const scale=240/mapWidth;minimapCtx.fillStyle='#1a1a2e';minimapCtx.fillRect(0,0,240,240);
        minimapCtx.fillStyle='#2ecc71';minimapCtx.beginPath();minimapCtx.arc(extractPoint.x*scale,extractPoint.y*scale,8,0,Math.PI*2);minimapCtx.fill();
        minimapCtx.fillStyle='#f4d58d';for(let entrance of pyramidEntrances){minimapCtx.beginPath();minimapCtx.arc(entrance.x*scale,entrance.y*scale,4,0,Math.PI*2);minimapCtx.fill();}
        for(let box of boxes){if(box.looted&&box.items.length===0)continue;minimapCtx.fillStyle=box.type.color;minimapCtx.fillRect(box.x*scale-2,box.y*scale-2,4,4);}
        minimapCtx.fillStyle='#e74c3c';for(let enemy of enemies){minimapCtx.beginPath();minimapCtx.arc(enemy.x*scale,enemy.y*scale,2,0,Math.PI*2);minimapCtx.fill();}
        if(boss&&boss.health>0){minimapCtx.fillStyle='#9b59b6';minimapCtx.beginPath();minimapCtx.arc(boss.x*scale,boss.y*scale,5,0,Math.PI*2);minimapCtx.fill();}
        minimapCtx.fillStyle='#00ffff';minimapCtx.font='bold 14px Arial';minimapCtx.textAlign='center';minimapCtx.fillText('◆',player.x*scale,player.y*scale+5);
    }
    function updateHUD(){document.getElementById('healthBar').style.width=(player.health/CONFIG.PLAYER_MAX_HEALTH*100)+'%';document.getElementById('killsDisplay').textContent=kills;document.getElementById('valueDisplay').textContent=totalValue;document.getElementById('helmetName').textContent=`🪖 ${player.helmet.name}`;document.getElementById('helmetDurability').style.width=player.helmet.maxDurability>0?(player.helmetDurability/player.helmet.maxDurability*100)+'%':'0%';document.getElementById('armorName').textContent=`🛡️ ${player.armor.name}`;document.getElementById('armorDurability').style.width=player.armor.maxDurability>0?(player.armorDurability/player.armor.maxDurability*100)+'%':'0%';const weapon=getCurrentWeapon();if(weapon){if(player.isReloading){const percent=Math.floor((player.reloadProgress/CONFIG.RELOAD_TIME)*100);document.getElementById('ammoCount').innerHTML=`<span class="reload-indicator">换弹 ${percent}%</span>`;}else{document.getElementById('ammoCount').textContent=player.ammoInMag;}document.getElementById('ammoMax').textContent=weapon.magSize;}if(player.bandageActive){document.getElementById('bandageIndicator').style.display='block';}else if(!player.bandageActive&&!player.isLocked){document.getElementById('bandageIndicator').style.display='none';}if(player.isLocked){document.getElementById('bandageIndicator').style.display='block';document.getElementById('bandageIndicator').innerHTML=`🩹 锁血中 ${(player.lockTimer/1000).toFixed(1)}s`;}}
    function updateWeaponSlotsUI(){const container=document.getElementById('weaponSlots');container.innerHTML='';for(let i=0;i<2;i++){const weapon=player.weaponSlots[i];const active=i===player.activeSlot;const div=document.createElement('div');div.className=`weapon-slot slot${i+1} ${active?'active':''}`;div.innerHTML=`<span class="weapon-slot-key">[${i+1}]</span><div class="weapon-slot-name">${weapon?weapon.name:'空'}</div><div class="weapon-slot-ammo">${weapon?`弹药: ${player.ammo[weapon.bulletType]||0}`:''}</div>`;container.appendChild(div);}}
    function restartGame(){document.getElementById('gameOverScreen').classList.remove('show');resetGame();gameRunning=true;gameOver=false;gameLoop();}
    function gameLoop(){if(!gameRunning)return;updatePlayer();updateEnemies();updateBullets();updateParticles();updateDamageNumbers();updateCamera();render();requestAnimationFrame(gameLoop);}
    init();
</script>
</body>
</html>
